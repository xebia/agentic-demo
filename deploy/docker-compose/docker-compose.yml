# Ticketing System — Docker Compose
# Run from repo root: docker compose -f deploy/docker-compose/docker-compose.yml up --build
#
# Prerequisites:
#   - Docker Desktop with Linux containers
#   - Copy .env.example to .env and fill in values
#
# Services exposed:
#   - Web app:       http://localhost:5254
#   - API docs:      http://localhost:5254/scalar/v1
#   - Auth service:  http://localhost:5069
#   - Chatbot:       http://localhost:5252

x-servicebus-conn: &servicebus-conn
  "Endpoint=sb://servicebus;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"

services:
  # ==========================================================
  # Infrastructure
  # ==========================================================

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Your_Strong_Password_123!}"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -No || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: nc -z 127.0.0.1 10000 || exit 1
      interval: 5s
      timeout: 3s
      retries: 10

  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    depends_on:
      sql:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Your_Strong_Password_123!}"
      SQL_SERVER: sql
    volumes:
      - ./servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5672:5672"
    healthcheck:
      test: /bin/sh -c "curl -f http://localhost:5672 || exit 0"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # ==========================================================
  # Application Services
  # ==========================================================

  auth:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.auth
    ports:
      - "5069:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    healthcheck:
      test: curl -f http://localhost:8080/ || exit 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.web
    ports:
      - "5254:8080"
    depends_on:
      sql:
        condition: service_healthy
      auth:
        condition: service_healthy
      servicebus:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TicketingDb: "Server=sql;Database=TicketingDb;User Id=sa;Password=${SA_PASSWORD:-Your_Strong_Password_123!};Encrypt=false;TrustServerCertificate=true"
      JwtSettings__AuthServiceUrl: "http://auth:8080"
      JwtSettings__Issuer: "https://auth.ticketing.local"
      JwtSettings__Audience: "ticketing-api"
      ServiceBus__ConnectionString: *servicebus-conn
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  vendormock:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.vendormock
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CallbackApi__BaseUrl: "http://web:8080"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  chatbot:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.chatbot
    ports:
      - "5252:8080"
    depends_on:
      auth:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ChatSettings__AuthServiceUrl: "http://auth:8080"
      ChatSettings__McpEndpointUrl: "http://web:8080/mcp"
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      AzureOpenAI__DeploymentName: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4-turbo}"

  # ==========================================================
  # AI Agent Workers (Azure Functions)
  # ==========================================================

  triage-agent:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.agent
      args:
        AGENT_PROJECT: Ticketing.TriageAgent
    depends_on:
      servicebus:
        condition: service_started
      azurite:
        condition: service_healthy
      auth:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      AZURE_FUNCTIONS_ENVIRONMENT: Development
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      ServiceBusConnection: *servicebus-conn
      ServiceBus__ConnectionString: *servicebus-conn
      AuthService__Url: "http://auth:8080"
      AuthService__ClientId: "triage-agent"
      AuthService__ClientSecret: "secret-for-triage"
      TicketingApi__BaseUrl: "http://web:8080"
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      AzureOpenAI__DeploymentName: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4-turbo}"

  purchasing-agent:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.agent
      args:
        AGENT_PROJECT: Ticketing.PurchasingAgent
    depends_on:
      servicebus:
        condition: service_started
      azurite:
        condition: service_healthy
      auth:
        condition: service_healthy
      web:
        condition: service_healthy
      fulfillment-agent:
        condition: service_started
    environment:
      AZURE_FUNCTIONS_ENVIRONMENT: Development
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      ServiceBusConnection: *servicebus-conn
      ServiceBus__ConnectionString: *servicebus-conn
      AuthService__Url: "http://auth:8080"
      AuthService__ClientId: "purchasing-agent"
      AuthService__ClientSecret: "secret-for-purchasing"
      TicketingApi__BaseUrl: "http://web:8080"
      FulfillmentApi__BaseUrl: "http://fulfillment-agent:80"
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      AzureOpenAI__DeploymentName: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4-turbo}"

  fulfillment-agent:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.agent
      args:
        AGENT_PROJECT: Ticketing.FulfillmentAgent
    depends_on:
      servicebus:
        condition: service_started
      azurite:
        condition: service_healthy
      auth:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      AZURE_FUNCTIONS_ENVIRONMENT: Development
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      ServiceBusConnection: *servicebus-conn
      ServiceBus__ConnectionString: *servicebus-conn
      AuthService__Url: "http://auth:8080"
      AuthService__ClientId: "fulfillment-agent"
      AuthService__ClientSecret: "secret-for-fulfillment"
      TicketingApi__BaseUrl: "http://web:8080"
      VendorApi__BaseUrl: "http://vendormock:8080"

  operations-agent:
    build:
      context: ../../
      dockerfile: deploy/docker-compose/Dockerfile.agent
      args:
        AGENT_PROJECT: Ticketing.OperationsAgent
    depends_on:
      servicebus:
        condition: service_started
      azurite:
        condition: service_healthy
      auth:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      AZURE_FUNCTIONS_ENVIRONMENT: Development
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      ServiceBusConnection: *servicebus-conn
      ServiceBus__ConnectionString: *servicebus-conn
      AuthService__Url: "http://auth:8080"
      AuthService__ClientId: "operations-agent"
      AuthService__ClientSecret: "secret-for-operations"
      TicketingApi__BaseUrl: "http://web:8080"
      VendorApi__BaseUrl: "http://vendormock:8080"
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      AzureOpenAI__DeploymentName: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4-turbo}"

volumes:
  sql-data:
  azurite-data:
